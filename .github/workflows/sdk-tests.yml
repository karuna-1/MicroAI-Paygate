name: SDK Tests

on:
  pull_request:
    paths:
      - 'sdk/**'
      - 'gateway/**'
      - 'verifier/**'
      - 'web/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/sdk-tests.yml'
  push:
    branches: [main]
    paths:
      - 'sdk/**'
      - 'gateway/**'
      - 'verifier/**'
      - 'web/**'
      - 'tests/**'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/sdk-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdk-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - name: Install SDK deps
        working-directory: sdk/typescript
        run: bun install --frozen-lockfile

      - name: Typecheck SDK
        working-directory: sdk/typescript
        run: bun run typecheck

      - name: Test SDK
        working-directory: sdk/typescript
        run: bun run test

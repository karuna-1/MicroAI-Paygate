go:
  - changed-files:
      - AnyGlobToAnyFile:
          - "gateway/**"
          - "deploy/fly/gateway.fly.toml"

rust:
  - changed-files:
      - AnyGlobToAnyFile:
          - "verifier/**"

TypeScript:
  - changed-files:
      - AnyGlobToAnyFile:
          - "web/**"
          - "sdk/typescript/**"
          - "tests/**/*.ts"
          - "tests/**/*.tsx"
          - "package.json"
          - "bun.lock"
          - "tsconfig.json"

documentation:
  - changed-files:
      - AnyGlobToAnyFile:
          - "**/*.md"
          - "gateway/openapi.yaml"
          - ".env.example"
          - ".env.production.example"
          - ".github/ISSUE_TEMPLATE/**"
          - ".github/pull_request_template.md"

github_actions:
  - changed-files:
      - AnyGlobToAnyFile:
          - ".github/workflows/**"
          - ".github/ISSUE_TEMPLATE/**"
          - ".github/dependabot.yml"
          - ".github/pull_request_template.md"

type:docs:
  - changed-files:
      - AnyGlobToAnyFile:
          - "**/*.md"
          - "gateway/openapi.yaml"
          - ".env.example"
          - ".env.production.example"
          - ".github/ISSUE_TEMPLATE/**"
          - ".github/pull_request_template.md"

type:devops:
  - changed-files:
      - AnyGlobToAnyFile:
          - "deploy/**"
          - "docker-compose.yml"
          - ".env.production.example"
          - ".github/workflows/**"
          - ".github/dependabot.yml"

type:testing:
  - changed-files:
      - AnyGlobToAnyFile:
          - "tests/**"
          - "run_e2e.sh"
          - "gateway/**/*_test.go"
          - "sdk/typescript/**/__tests__/**"
          - "web/**/*.test.*"
          - "web/**/*.spec.*"

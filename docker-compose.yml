version: '3.8'

services:
  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - VERIFIER_URL=http://verifier:3002
      - REDIS_URL=redis:6379
      - CACHE_ENABLED=${CACHE_ENABLED:-false}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
      - RECEIPT_STORE=${RECEIPT_STORE:-redis}
      - CHAIN_ID=${CHAIN_ID:-84532}
      # Pass through from .env file
      - OPENROUTER_API_KEY
      - OPENROUTER_MODEL
      - SERVER_WALLET_PRIVATE_KEY
      - RECIPIENT_ADDRESS
      - PAYMENT_AMOUNT
      - REDIS_PASSWORD
      - REDIS_DB
      - CACHE_TTL_SECONDS
    depends_on:
      verifier:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - microai-net

  verifier:
    build: ./verifier
    ports:
      - "3002:3002"
    environment:
      - EXPECTED_CHAIN_ID=${EXPECTED_CHAIN_ID:-${CHAIN_ID:-84532}}
      - SIGNATURE_EXPIRY_SECONDS=${SIGNATURE_EXPIRY_SECONDS:-300}
      - SIGNATURE_CLOCK_SKEW_SECONDS=${SIGNATURE_CLOCK_SKEW_SECONDS:-60}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks:
      - microai-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - microai-net
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build: ./web
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:3000
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - microai-net

networks:
  microai-net:
    driver: bridge

volumes:
  redis-data:

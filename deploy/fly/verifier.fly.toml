app = "<verifier-app>"
# Demo default region is Mumbai. Change primary_region before deploy if another
# Fly region is closer to the intended users.
primary_region = "bom"

# Keep this app at one Machine until replay nonce storage is moved out of process.
# Multi-replica verifier deployments need a shared nonce store such as Redis.

[build]
  dockerfile = "Dockerfile"

[env]
  EXPECTED_CHAIN_ID = "84532"
  SIGNATURE_EXPIRY_SECONDS = "300"
  SIGNATURE_CLOCK_SKEW_SECONDS = "60"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    port = 3002
    timeout = "5s"
    type = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
